<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citadel</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #181425; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
      #game-canvas { display: block; flex: 1; }
      #hud { height: 40px; background: #262b44; color: #c0cbdc; font-family: monospace; font-size: 13px; display: flex; align-items: center; gap: 16px; padding: 0 12px; user-select: none; }
      #hud button { background: #3a4466; color: #c0cbdc; border: 1px solid #5a6988; padding: 2px 10px; cursor: pointer; font-family: monospace; font-size: 13px; }
      #hud button:hover { background: #5a6988; }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <span id="hud-day">Day 1</span>
      <span id="hud-tick">Tick 0</span>
      <button id="btn-pause">Pause</button>
      <button id="btn-1x">1×</button>
      <button id="btn-2x">2×</button>
      <button id="btn-4x">4×</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
