<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citadel</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #181425; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
      #canvas { display: block; flex: 1; }
      #hud { background: #262b44; color: #c0cbdc; font-family: monospace; font-size: 13px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 6px 12px; user-select: none; border-top: 1px solid #3a4466; }
      #hud button { background: #3a4466; color: #c0cbdc; border: 1px solid #5a6988; padding: 2px 10px; cursor: pointer; font-family: monospace; font-size: 13px; }
      #hud button:hover { background: #5a6988; }
      /* Citadel 07: tier-locked build buttons — greyed, not hidden (teaches progression). */
      #hud button.tier-locked, #hud button.tier-locked:hover { opacity: 0.4; cursor: not-allowed; }
      #hud .sep { width: 1px; background: #5a6988; align-self: stretch; margin: 0 4px; }
      #lbl-mode { color: #fee761; min-width: 160px; }
      /* Phase 3 UI */
      #hud-happiness { color: #fee761; }
      /* Phase 4 siege HUD */
      #hud-threat { color: #63c74d; }
      #hud-defense { color: #2ce8f5; }
      #hud-keep { color: #8b9bb4; }
      #decrees-panel { display: flex; gap: 6px; align-items: center; }
      #decrees-panel label { cursor: pointer; display: flex; align-items: center; gap: 3px; }
      #trader-panel { background: #3a4466; border: 1px solid #fee761; padding: 4px 8px; display: none; }
      #trader-panel.visible { display: flex; flex-direction: column; gap: 4px; }
      .trade-offer-btn { background: #5a6988; color: #c0cbdc; border: 1px solid #fee761; padding: 2px 8px; cursor: pointer; font-family: monospace; font-size: 12px; }
      .trade-offer-btn:hover { background: #fee761; color: #181425; }
      /* Phase 5: tier display */
      #hud-tier { color: #fee761; font-weight: bold; }
      /* Phase 4.5: hazard HUD */
      #hud-fire { color: #8b9bb4; }
      #hud-disease { color: #8b9bb4; }
      /* Brief 19: follow-cam HUD strip — floats over the canvas top-left, shown
         only while locked onto a villager. Colors mirror EDG (cyan accent). */
      #follow-hud {
        position: absolute; top: 8px; left: 8px; display: none;
        background: #262b44; color: #2ce8f5; border: 1px solid #2ce8f5;
        font-family: monospace; font-size: 13px; padding: 4px 10px;
        border-radius: 3px; user-select: none; pointer-events: none;
      }
      #follow-hud.visible { display: block; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <!-- Brief 19: follow-cam HUD strip (DOM; the WebGPU overlay callback is a no-op) -->
    <div id="follow-hud"></div>
    <div id="hud">
      <!-- Phase 5: tier display — always visible, shows current settlement rank -->
      <span id="hud-tier">Hamlet</span>
      <div class="sep"></div>
      <span id="hud-day">Day 1 (spring)</span>
      <span id="hud-pop">Pop 0/0</span>
      <span id="hud-bread">Bread: 0</span>
      <span id="hud-wood">Wood: 0</span>
      <span id="hud-happiness">Happy: 40</span>
      <div class="sep"></div>
      <!-- Phase 4 siege status -->
      <span id="hud-threat">Threat: 0</span>
      <span id="hud-defense">Defense: 0</span>
      <span id="hud-keep">Keep: none</span>
      <!-- Phase 4.5 hazard status -->
      <span id="hud-fire">Fire: none</span>
      <span id="hud-disease">Disease: none</span>
      <div class="sep"></div>
      <button id="btn-pause">Pause</button>
      <button id="btn-1x">1x</button>
      <button id="btn-2x">2x</button>
      <button id="btn-4x">4x</button>
      <div class="sep"></div>
      <button id="btn-build-house">House</button>
      <button id="btn-build-farm">Farm</button>
      <button id="btn-build-mill">Mill</button>
      <button id="btn-build-bakery">Bakery</button>
      <button id="btn-build-woodcutter">Woodcutter</button>
      <button id="btn-build-storehouse">Storehouse</button>
      <button id="btn-build-chapel">Chapel</button>
      <button id="btn-build-market">Market</button>
      <button id="btn-build-watchpost">Watchpost</button>
      <button id="btn-build-tradingpost">Trading Post</button>
      <button id="btn-build-road">Road</button>
      <div class="sep"></div>
      <!-- Phase 4: refiners + siege structures -->
      <button id="btn-build-quarry">Quarry</button>
      <button id="btn-build-sawmill">Sawmill</button>
      <button id="btn-build-smith">Smith</button>
      <button id="btn-build-mine">Mine</button>
      <button id="btn-build-wall">Wall</button>
      <button id="btn-build-gate">Gate</button>
      <button id="btn-build-tower">Tower</button>
      <button id="btn-build-garrison">Garrison</button>
      <button id="btn-build-keep">Keep</button>
      <div class="sep"></div>
      <button id="btn-demolish">Demolish</button>
      <button id="btn-upgrade">Upgrade</button>
      <button id="btn-cancel">Cancel</button>
      <span id="lbl-mode">Mode: None</span>
      <div class="sep"></div>
      <!-- Phase 5: Save / Load -->
      <button id="btn-save">Save</button>
      <button id="btn-load">Load</button>
      <!-- Hidden file input for loading JSON saves -->
      <input type="file" id="load-file-input" accept=".json" style="display:none">
      <div class="sep"></div>
      <!-- Phase 3: Decrees panel -->
      <div id="decrees-panel">
        <span>Decrees:</span>
        <label><input type="checkbox" id="decree-workHours"> Work Hours</label>
        <label><input type="checkbox" id="decree-rationing"> Rationing</label>
        <label><input type="checkbox" id="decree-tithe"> Tithe</label>
        <label><input type="checkbox" id="decree-conscription"> Conscription</label>
      </div>
      <div class="sep"></div>
      <span id="hud-events"></span>
      <!-- Phase 3: Trader panel (shown when trader is present) -->
      <div id="trader-panel">
        <span id="trader-title">Merchant Caravan</span>
        <div id="trader-offers"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
