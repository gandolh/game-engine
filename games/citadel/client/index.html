<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citadel</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <!-- Minimap now renders IN-CANVAS via @engine/ui (raw UISurface quads, src/ui/minimap.ts),
         top-right, with click-to-seek forwarded from the canvas in main.ts. (Was a 2D canvas.)
         Occupancy badges likewise render in-canvas now (src/render/occupancy-badges.ts). -->
    <!-- Event toasts now render IN-CANVAS via @engine/ui (src/ui/toast.ts). This hidden
         aria-live region is their a11y mirror: each new toast's text is announced to
         screen readers here (the visuals are 100% in the WebGPU canvas). -->
    <div id="toast-live" aria-live="polite" aria-atomic="true"></div>
    <!-- engine-ui chunk 7: hidden host for the @engine/ui a11y mirror. The framework
         renders the HUD 100% in-canvas; this empty container is where createA11yMirror
         builds a parallel, visually-hidden DOM subtree so the in-canvas HUD is reachable
         by screen readers + the Tab order. Populated/managed entirely in main.ts. -->
    <div id="ui-a11y-mirror"></div>
    <!-- Citadel inspect chunk 2: a SECOND hidden a11y-mirror host, for the floating building
         inspect panel (src/ui/inspect-panel.ts). It is a separate UI root with its own
         createA11yMirror mount so its visually-hidden DOM subtree + Tab order stay distinct
         from the HUD's. Empty until a building is selected; cleared on close. -->
    <div id="ui-a11y-inspect"></div>
    <!-- Citadel villager-job chunk 3: a THIRD hidden a11y-mirror host, for the floating
         follow-a-villager panel (src/ui/villager-panel.ts). This in-canvas panel supersedes
         the old DOM #follow-hud strip. It is a read-only UI root (no buttons), so it has no
         input dispatcher — but it keeps its own createA11yMirror mount so screen-reader users
         get the followed villager's job/id/activity/cargo. Empty until a villager is followed;
         cleared on release. -->
    <div id="ui-a11y-villager"></div>

    <!-- Citadel build toolbar now renders IN-CANVAS via @engine/ui (src/ui/build-bar.ts):
         a bottom-left grid of grouped text buttons. This hidden mount is its a11y mirror —
         a parallel visually-hidden DOM tree of real <button>s so the in-canvas toolbar is
         reachable by screen readers + the keyboard. Built/managed entirely in main.ts. -->
    <div id="ui-a11y-buildbar"></div>

    <!-- DOM-overlay removal: a FIFTH hidden a11y-mirror host, for the in-canvas settings modal
         (src/ui/settings-modal.ts). The tabbed dialog (Display / Atmosphere / Simulation) renders
         100% in the WebGPU canvas via @engine/ui; this mount holds its parallel visually-hidden
         DOM tree (real <button>s, an <input type=checkbox> per toggle, an <input type=range> for
         zoom) so the modal is reachable by screen readers + the keyboard. Empty while closed. -->
    <div id="ui-a11y-settings"></div>

    <!-- Chunk 1A (brief 106): a SIXTH hidden a11y-mirror host, for the siege/hazard HUD
         (src/ui/siege-hud.ts) — threat/defense/keep/fire/disease + the placement-mode readout,
         the last gameplay DOM readouts, now rendered IN-CANVAS via @engine/ui. Read-only (no
         buttons); the mirror still exposes the live text to screen readers. -->
    <div id="ui-a11y-siege"></div>

    <!-- engine-ui chunk 7: the settlement readout (tier/day/pop/bread/wood/happiness) and
         the speed/pause controls are rendered IN-CANVAS via @engine/ui (see
         src/ui/resource-hud.ts). Chunk 1A moved the last gameplay readouts (siege/hazard status
         + placement mode) in-canvas too (src/ui/siege-hud.ts), so this bar now holds only
         Settings + Save/Load (browser file I/O has no in-canvas equivalent). -->
    <div id="hud">
      <button id="btn-settings">Settings</button>
      <div class="sep"></div>
      <!-- Phase 5: Save / Load -->
      <button id="btn-save">Save</button>
      <button id="btn-load">Load</button>
      <!-- Hidden file input for loading JSON saves -->
      <input type="file" id="load-file-input" accept=".json" style="display:none">
    </div>
    <!-- Phase G: the DOM trader panel is gone — the tradingpost's in-canvas inspect panel now
         renders the trade-offer menu (see inspect-panel.ts's tradeBox). -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
