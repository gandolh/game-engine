<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citadel</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #181425; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
      /* min-height: 0 lets flex:1 actually shrink the canvas below its intrinsic
         backing-store size; without it a large (maximized) window grows the
         canvas past 100vh and pushes #build-bar / #hud below the clipped fold. */
      #canvas { display: block; flex: 1; min-height: 0; }
      /* Build/HUD bars must never be squeezed away — keep their content height. */
      #build-bar, #hud { flex: none; }
      /* Condensed for laptop screens: single non-wrapping row that scrolls
         horizontally on overflow, so the readout strip keeps a fixed height and
         never grows to shove the canvas up (the old flex-wrap caused that). */
      #hud { background: #262b44; color: #c0cbdc; font-family: monospace; font-size: 12px; display: flex; flex-wrap: nowrap; align-items: center; gap: 7px; padding: 3px 10px; user-select: none; border-top: 1px solid #3a4466; overflow-x: auto; overflow-y: hidden; white-space: nowrap; }
      #hud > span { white-space: nowrap; }
      #hud button { background: #3a4466; color: #c0cbdc; border: 1px solid #5a6988; padding: 1px 8px; cursor: pointer; font-family: monospace; font-size: 12px; white-space: nowrap; }
      #hud button:hover { background: #5a6988; }
      /* Citadel 07: tier-locked build buttons — greyed, not hidden (teaches progression). */
      #hud button.tier-locked, #hud button.tier-locked:hover { opacity: 0.4; cursor: not-allowed; }

      /* Citadel build toolbar: build buttons grouped by purpose with icons.
         Condensed for laptop screens — groups sit on ONE row (label beside its
         icons), buttons are icon-only (the text label collapses via font-size:0
         and the name lives in each button's title tooltip). This roughly halves
         the bar's height versus the old stacked, full-label layout. */
      #build-bar {
        background: #262b44; color: #c0cbdc; font-family: monospace;
        display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
        padding: 3px 10px; user-select: none; border-top: 1px solid #3a4466;
      }
      .build-group {
        display: flex; flex-direction: row; align-items: center; gap: 4px;
        padding: 0 7px; border-right: 1px solid #3a4466;
      }
      .build-group:last-child { border-right: none; }
      .build-group-label {
        font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
        color: #8b9bb4; writing-mode: vertical-rl; transform: rotate(180deg);
        line-height: 1; max-height: 38px;
      }
      .build-group-btns { display: flex; flex-wrap: wrap; gap: 3px; max-width: 132px; }
      #build-bar button {
        display: inline-flex; align-items: center; justify-content: center;
        background: #3a4466; color: #c0cbdc; border: 1px solid #5a6988;
        padding: 3px; width: 28px; height: 26px; cursor: pointer;
        font-family: monospace; font-size: 0; border-radius: 3px;
      }
      #build-bar button:hover { background: #5a6988; }
      #build-bar button.selected {
        background: #5a6988; border-color: #fee761; color: #fee761;
      }
      #build-bar button .bi { font-size: 15px; line-height: 1; }
      #build-bar button.tier-locked, #build-bar button.tier-locked:hover {
        opacity: 0.4; cursor: not-allowed;
      }
      #hud .sep { width: 1px; background: #5a6988; align-self: stretch; margin: 0 4px; }
      #lbl-mode { color: #fee761; min-width: 160px; }
      /* Phase 3 UI */
      #hud-happiness { color: #fee761; }
      /* Phase 4 siege HUD */
      #hud-threat { color: #63c74d; }
      #hud-defense { color: #2ce8f5; }
      #hud-keep { color: #8b9bb4; }
      #decrees-panel { display: flex; gap: 6px; align-items: center; }
      #decrees-panel label { cursor: pointer; display: flex; align-items: center; gap: 3px; }
      /* Trader panel floats over the canvas (bottom-right) instead of living in
         the HUD flex row, so its appearance never resizes the bottom bars. */
      #trader-panel {
        position: absolute; left: 8px; top: 44px; z-index: 20;
        background: #3a4466; border: 1px solid #fee761; padding: 6px 10px;
        border-radius: 3px; display: none; font-family: monospace; font-size: 12px;
        box-shadow: 0 4px 14px rgba(24, 20, 37, 0.55);
      }
      #trader-panel.visible { display: flex; flex-direction: column; gap: 4px; }
      #trader-title { color: #fee761; }

      /* Event toasts — top-center overlay, pointer-transparent, never in flow. */
      #toast-container {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 90; display: flex; flex-direction: column; align-items: center;
        gap: 6px; pointer-events: none; width: max-content; max-width: 72vw;
      }
      .toast {
        font-family: monospace; font-size: 13px; color: #c0cbdc;
        background: #262b44; border: 1px solid #5a6988; border-left-width: 4px;
        border-radius: 3px; padding: 6px 14px; max-width: 100%;
        box-shadow: 0 4px 16px rgba(24, 20, 37, 0.6);
        opacity: 0; transform: translateY(-10px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.hide { opacity: 0; transform: translateY(-10px); }
      .toast-danger { border-left-color: #e43b44; color: #f6757a; }
      .toast-warn   { border-left-color: #feae34; color: #fee761; }
      .toast-good   { border-left-color: #63c74d; color: #63c74d; }
      .toast-info   { border-left-color: #2ce8f5; }

      /* Minimap — top-right overview, drawn on its own 2D canvas. */
      #minimap {
        position: absolute; top: 8px; right: 8px; z-index: 20;
        width: 168px; height: 168px; display: block;
        background: #181425; border: 1px solid #5a6988; border-radius: 3px;
        box-shadow: 0 4px 14px rgba(24, 20, 37, 0.55); cursor: pointer;
      }
      .trade-offer-btn { background: #5a6988; color: #c0cbdc; border: 1px solid #fee761; padding: 2px 8px; cursor: pointer; font-family: monospace; font-size: 12px; }
      .trade-offer-btn:hover { background: #fee761; color: #181425; }
      /* Phase 5: tier display */
      #hud-tier { color: #fee761; font-weight: bold; }
      /* Phase 4.5: hazard HUD */
      #hud-fire { color: #8b9bb4; }
      #hud-disease { color: #8b9bb4; }
      /* Brief 19: follow-cam HUD strip — floats over the canvas top-left, shown
         only while locked onto a villager. Colors mirror EDG (cyan accent). */
      #follow-hud {
        position: absolute; top: 8px; left: 8px; display: none;
        background: #262b44; color: #2ce8f5; border: 1px solid #2ce8f5;
        font-family: monospace; font-size: 13px; padding: 4px 10px;
        border-radius: 3px; user-select: none; pointer-events: none;
      }
      #follow-hud.visible { display: block; }

      /* Brief 25: Settings modal. Colors on EDG palette (the .ts guard does not
         scan HTML, but we keep CSS on-palette for consistency). */
      .settings-modal {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: center; justify-content: center;
        background: rgba(24, 20, 37, 0.72); /* EDG black @ alpha (backdrop) */
        font-family: monospace; color: #c0cbdc;
      }
      .settings-modal[hidden] { display: none; }
      .settings-dialog {
        background: #262b44; border: 1px solid #5a6988; border-radius: 4px;
        width: min(520px, 92vw); max-height: 86vh;
        display: flex; flex-direction: column;
        box-shadow: 0 6px 24px rgba(24, 20, 37, 0.6);
      }
      .settings-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px; border-bottom: 1px solid #3a4466;
      }
      .settings-title { font-size: 15px; color: #fee761; font-weight: bold; }
      .settings-close {
        background: none; border: none; color: #8b9bb4; cursor: pointer;
        font-size: 22px; line-height: 1; padding: 0 4px; font-family: monospace;
      }
      .settings-close:hover { color: #fee761; }
      .settings-search {
        margin: 10px 14px 0; padding: 6px 8px; font-family: monospace; font-size: 13px;
        background: #181425; color: #c0cbdc; border: 1px solid #5a6988; border-radius: 3px;
      }
      .settings-search::placeholder { color: #5a6988; }
      .settings-tablist {
        display: flex; gap: 4px; flex-wrap: wrap; padding: 10px 14px 0;
        border-bottom: 1px solid #3a4466;
      }
      .settings-tab {
        background: #3a4466; color: #c0cbdc; border: 1px solid #5a6988;
        border-bottom: none; border-radius: 3px 3px 0 0; padding: 5px 12px;
        cursor: pointer; font-family: monospace; font-size: 13px;
      }
      .settings-tab:hover { background: #5a6988; }
      .settings-tab.selected {
        background: #262b44; color: #fee761; border-color: #fee761;
      }
      .settings-tab:focus-visible { outline: 2px solid #2ce8f5; outline-offset: 1px; }
      .settings-panels { overflow-y: auto; padding: 6px 14px 14px; }
      .settings-panel[hidden] { display: none; }
      .settings-panel:focus-visible { outline: none; }
      .settings-row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; padding: 9px 2px; border-bottom: 1px solid #3a4466;
      }
      .settings-row[hidden] { display: none; }
      .settings-row-label { font-size: 13px; cursor: default; }
      .settings-checkbox { cursor: pointer; width: 16px; height: 16px; }
      .settings-control { display: flex; align-items: center; gap: 8px; }
      .settings-zoom { cursor: pointer; }
      .settings-zoom-value { color: #fee761; min-width: 38px; text-align: right; }
      .settings-speed-group { display: flex; gap: 4px; }
      .settings-speed-btn {
        background: #3a4466; color: #c0cbdc; border: 1px solid #5a6988;
        padding: 3px 12px; cursor: pointer; font-family: monospace; font-size: 13px;
        border-radius: 3px;
      }
      .settings-speed-btn:hover { background: #5a6988; }
      @media (max-width: 480px) {
        .settings-dialog { width: 96vw; max-height: 92vh; }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <!-- Brief 19: follow-cam HUD strip (DOM; the WebGPU overlay callback is a no-op) -->
    <div id="follow-hud"></div>
    <!-- Minimap: top-right world overview (2D canvas overlay, drawn in main.ts) -->
    <canvas id="minimap" width="168" height="168" title="Click to jump the camera"></canvas>
    <!-- Event toasts: top-center transient notifications (populated in main.ts) -->
    <div id="toast-container"></div>

    <!-- Citadel build toolbar: build buttons grouped by purpose, each with an
         icon glyph. Lives in its own strip above the HUD so the readout row
         stays uncluttered. Button IDs are unchanged — main.ts wires them by id. -->
    <div id="build-bar">
      <div class="build-group">
        <span class="build-group-label">Housing</span>
        <div class="build-group-btns">
          <button id="btn-build-house"><span class="bi">🏠</span>House</button>
          <button id="btn-build-storehouse"><span class="bi">📦</span>Storehouse</button>
          <button id="btn-build-well"><span class="bi">💧</span>Well</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Food</span>
        <div class="build-group-btns">
          <button id="btn-build-farm"><span class="bi">🌾</span>Farm</button>
          <button id="btn-build-mill"><span class="bi">🌀</span>Mill</button>
          <button id="btn-build-bakery"><span class="bi">🍞</span>Bakery</button>
          <button id="btn-build-woodcutter"><span class="bi">🪓</span>Woodcutter</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Refining</span>
        <div class="build-group-btns">
          <button id="btn-build-sawmill"><span class="bi">🪵</span>Sawmill</button>
          <button id="btn-build-quarry"><span class="bi">⛏️</span>Quarry</button>
          <button id="btn-build-mine"><span class="bi">🕳️</span>Mine</button>
          <button id="btn-build-smith"><span class="bi">🔨</span>Smith</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Services</span>
        <div class="build-group-btns">
          <button id="btn-build-chapel"><span class="bi">⛪</span>Chapel</button>
          <button id="btn-build-market"><span class="bi">🏪</span>Market</button>
          <button id="btn-build-watchpost"><span class="bi">🔭</span>Watchpost</button>
          <button id="btn-build-tradingpost"><span class="bi">⚖️</span>Trading Post</button>
          <button id="btn-build-healer"><span class="bi">⚕️</span>Healer</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Defense</span>
        <div class="build-group-btns">
          <button id="btn-build-wall"><span class="bi">🧱</span>Wall</button>
          <button id="btn-build-gate"><span class="bi">🚪</span>Gate</button>
          <button id="btn-build-tower"><span class="bi">🗼</span>Tower</button>
          <button id="btn-build-garrison"><span class="bi">🛡️</span>Garrison</button>
          <button id="btn-build-keep"><span class="bi">🏰</span>Keep</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Tools</span>
        <div class="build-group-btns">
          <button id="btn-build-road"><span class="bi">🛤️</span>Road</button>
          <button id="btn-upgrade"><span class="bi">⬆️</span>Upgrade</button>
          <button id="btn-demolish"><span class="bi">💥</span>Demolish</button>
          <button id="btn-cancel"><span class="bi">✖️</span>Cancel</button>
        </div>
      </div>
    </div>

    <div id="hud">
      <!-- Phase 5: tier display — always visible, shows current settlement rank -->
      <span id="hud-tier">Hamlet</span>
      <div class="sep"></div>
      <span id="hud-day">Day 1 (spring)</span>
      <span id="hud-pop">Pop 0/0</span>
      <span id="hud-bread">Bread: 0</span>
      <span id="hud-wood">Wood: 0</span>
      <span id="hud-happiness">Happy: 40</span>
      <div class="sep"></div>
      <!-- Phase 4 siege status -->
      <span id="hud-threat">Threat: 0</span>
      <span id="hud-defense">Defense: 0</span>
      <span id="hud-keep">Keep: none</span>
      <!-- Phase 4.5 hazard status -->
      <span id="hud-fire">Fire: none</span>
      <span id="hud-disease">Disease: none</span>
      <div class="sep"></div>
      <button id="btn-pause">Pause</button>
      <button id="btn-1x">1x</button>
      <button id="btn-2x">2x</button>
      <button id="btn-4x">4x</button>
      <button id="btn-settings">Settings</button>
      <div class="sep"></div>
      <span id="lbl-mode">Mode: None</span>
      <div class="sep"></div>
      <!-- Phase 5: Save / Load -->
      <button id="btn-save">Save</button>
      <button id="btn-load">Load</button>
      <!-- Hidden file input for loading JSON saves -->
      <input type="file" id="load-file-input" accept=".json" style="display:none">
      <div class="sep"></div>
      <!-- Phase 3: Decrees panel -->
      <div id="decrees-panel">
        <span>Decrees:</span>
        <label><input type="checkbox" id="decree-workHours"> Work Hours</label>
        <label><input type="checkbox" id="decree-rationing"> Rationing</label>
        <label><input type="checkbox" id="decree-tithe"> Tithe</label>
        <label><input type="checkbox" id="decree-conscription"> Conscription</label>
      </div>
    </div>
    <!-- Phase 3: Trader panel — floats over the canvas (see #trader-panel CSS),
         no longer in the HUD flex row, so its appearance never resizes the bar. -->
    <div id="trader-panel">
      <span id="trader-title">Merchant Caravan</span>
      <div id="trader-offers"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
