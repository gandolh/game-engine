<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citadel</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <!-- Brief 19: follow-cam HUD strip (DOM; the WebGPU overlay callback is a no-op) -->
    <div id="follow-hud"></div>
    <!-- Minimap: top-right world overview (2D canvas overlay, drawn in main.ts) -->
    <canvas id="minimap" width="168" height="168" title="Click to jump the camera"></canvas>
    <!-- Event toasts: top-center transient notifications (populated in main.ts) -->
    <div id="toast-container"></div>
    <!-- Per-building occupancy badges: headcount chips floated over buildings
         (DOM overlay, pooled + positioned in main.ts via the world→screen map) -->
    <div id="occupancy-badges"></div>

    <!-- Citadel build toolbar: build buttons grouped by purpose, each with an
         icon glyph. Lives in its own strip above the HUD so the readout row
         stays uncluttered. Button IDs are unchanged — main.ts wires them by id. -->
    <div id="build-bar">
      <div class="build-group">
        <span class="build-group-label">Housing</span>
        <div class="build-group-btns">
          <button id="btn-build-house"><span class="bi">🏠</span>House</button>
          <button id="btn-build-storehouse"><span class="bi">📦</span>Storehouse</button>
          <button id="btn-build-well"><span class="bi">💧</span>Well</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Food</span>
        <div class="build-group-btns">
          <button id="btn-build-farm"><span class="bi">🌾</span>Farm</button>
          <button id="btn-build-mill"><span class="bi">🌀</span>Mill</button>
          <button id="btn-build-bakery"><span class="bi">🍞</span>Bakery</button>
          <button id="btn-build-woodcutter"><span class="bi">🪓</span>Woodcutter</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Refining</span>
        <div class="build-group-btns">
          <button id="btn-build-sawmill"><span class="bi">🪵</span>Sawmill</button>
          <button id="btn-build-quarry"><span class="bi">⛏️</span>Quarry</button>
          <button id="btn-build-mine"><span class="bi">🕳️</span>Mine</button>
          <button id="btn-build-smith"><span class="bi">🔨</span>Smith</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Services</span>
        <div class="build-group-btns">
          <button id="btn-build-chapel"><span class="bi">⛪</span>Chapel</button>
          <button id="btn-build-market"><span class="bi">🏪</span>Market</button>
          <button id="btn-build-watchpost"><span class="bi">🔭</span>Watchpost</button>
          <button id="btn-build-tradingpost"><span class="bi">⚖️</span>Trading Post</button>
          <button id="btn-build-healer"><span class="bi">⚕️</span>Healer</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Defense</span>
        <div class="build-group-btns">
          <button id="btn-build-wall"><span class="bi">🧱</span>Wall</button>
          <button id="btn-build-gate"><span class="bi">🚪</span>Gate</button>
          <button id="btn-build-tower"><span class="bi">🗼</span>Tower</button>
          <button id="btn-build-garrison"><span class="bi">🛡️</span>Garrison</button>
          <button id="btn-build-keep"><span class="bi">🏰</span>Keep</button>
        </div>
      </div>
      <div class="build-group">
        <span class="build-group-label">Tools</span>
        <div class="build-group-btns">
          <button id="btn-build-road"><span class="bi">🛤️</span>Road</button>
          <button id="btn-upgrade"><span class="bi">⬆️</span>Upgrade</button>
          <button id="btn-demolish"><span class="bi">💥</span>Demolish</button>
          <button id="btn-cancel"><span class="bi">✖️</span>Cancel</button>
        </div>
      </div>
    </div>

    <div id="hud">
      <!-- Phase 5: tier display — always visible, shows current settlement rank -->
      <span id="hud-tier">Hamlet</span>
      <div class="sep"></div>
      <span id="hud-day">Day 1 (spring)</span>
      <span id="hud-pop">Pop 0/0</span>
      <span id="hud-bread">Bread: 0</span>
      <span id="hud-wood">Wood: 0</span>
      <span id="hud-happiness">Happy: 40</span>
      <div class="sep"></div>
      <!-- Phase 4 siege status -->
      <span id="hud-threat">Threat: 0</span>
      <span id="hud-defense">Defense: 0</span>
      <span id="hud-keep">Keep: none</span>
      <!-- Phase 4.5 hazard status -->
      <span id="hud-fire">Fire: none</span>
      <span id="hud-disease">Disease: none</span>
      <div class="sep"></div>
      <button id="btn-pause">Pause</button>
      <button id="btn-1x">1x</button>
      <button id="btn-2x">2x</button>
      <button id="btn-4x">4x</button>
      <button id="btn-settings">Settings</button>
      <div class="sep"></div>
      <span id="lbl-mode">Mode: None</span>
      <div class="sep"></div>
      <!-- Phase 5: Save / Load -->
      <button id="btn-save">Save</button>
      <button id="btn-load">Load</button>
      <!-- Hidden file input for loading JSON saves -->
      <input type="file" id="load-file-input" accept=".json" style="display:none">
      <div class="sep"></div>
      <!-- Phase 3: Decrees panel -->
      <div id="decrees-panel">
        <span>Decrees:</span>
        <label><input type="checkbox" id="decree-workHours"> Work Hours</label>
        <label><input type="checkbox" id="decree-rationing"> Rationing</label>
        <label><input type="checkbox" id="decree-tithe"> Tithe</label>
        <label><input type="checkbox" id="decree-conscription"> Conscription</label>
      </div>
    </div>
    <!-- Phase 3: Trader panel — floats over the canvas (see #trader-panel CSS),
         no longer in the HUD flex row, so its appearance never resizes the bar. -->
    <div id="trader-panel">
      <span id="trader-title">Merchant Caravan</span>
      <div id="trader-offers"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
